<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DroneWeather Pro</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #121214;
            color: #fff;
            margin: 0;
            padding: 15px;
            display: flex;
            justify-content: center;
        }
        .container {
            width: 100%;
            max-width: 400px;
            background-color: #1a1a1e;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,.5);
            box-sizing: border-box;
        }
        h2 {
            text-align: center;
            margin-top: 0;
            color: #00adb5;
        }
        .local-info {
            text-align: center;
            font-size: .9rem;
            color: #aaa;
            margin-bottom: 15px;
        }
        .status-box {
            background-color: #555;
            color: #fff;
            text-align: center;
            padding: 15px;
            border-radius: 10px;
            font-weight: 700;
            font-size: 1.1rem;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,.2);
            transition: background 0.3s, color 0.3s;
        }
        .busca-container {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }
        input {
            flex: 1;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #333;
            background-color: #26262b;
            color: #fff;
            font-size: 1rem;
            width: 100%;
            box-sizing: border-box;
        }
        button {
            background-color: #00adb5;
            color: #fff;
            border: none;
            padding: 10px 15px;
            font-size: .9rem;
            font-weight: 700;
            border-radius: 8px;
            cursor: pointer;
        }
        .btn-gps {
            background-color: #28a745;
            width: 100%;
            margin-bottom: 20px;
            padding: 12px;
            color: #fff;
            border: none;
            font-weight: 700;
            border-radius: 8px;
            cursor: pointer;
        }
        .grid-clima {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }
        .card {
            background-color: #26262b;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            border-left: 4px solid #00adb5;
        }
        .card-titulo {
            font-size: .85rem;
            color: #aaa;
            text-transform: uppercase;
            margin-bottom: 5px;
        }
        .card-valor {
            font-size: 1.3rem;
            font-weight: 700;
        }
        #mapa {
            height: 200px;
            width: 100%;
            border-radius: 10px;
            border: 2px solid #26262b;
            margin-top: 10px;
        }
    </style>
</head>
<body>
<div class="container">
    <h2>DroneWeather Pro</h2>
    <div class="local-info" id="nomeLocal">Local: Aguardando consulta...</div>
    <div class="status-box" id="statusVoo">⚪ AGUARDANDO DADOS</div>
    <div class="busca-container">
        <input type="text" id="campoCidade" placeholder="Digite a cidade...">
        <button onclick="buscarPorCidade()">Buscar</button>
    </div>
    <button class="btn-gps" onclick="buscarPorGPS()">Usar Localização Atual (GPS)</button>
    <div class="grid-clima">
        <div class="card">
            <div class="card-titulo">Vento</div>
            <div class="card-valor" id="valorVento">-- km/h</div>
        </div>
        <div class="card">
            <div class="card-titulo">Rajada</div>
            <div class="card-valor" id="valorRajada">-- km/h</div>
        </div>
        <div class="card">
            <div class="card-titulo">Chuva (1h)</div>
            <div class="card-valor" id="valorChuva">-- mm</div>
        </div>
        <div class="card">
            <div class="card-titulo">Temperatura</div>
            <div class="card-valor" id="valorTemp">-- °C</div>
        </div>
    </div>
    <div id="mapa"></div>
</div>
<script>
    // Carregamento dinamico das dependencias do Leaflet via Base64 para evitar cortes do chat
    (function() {
        var css = document.createElement('link');
        css.rel = 'stylesheet';
        css.href = atob('aHR0cHM6Ly91bnBrZy5jb20vbGVhZmxldEAxLjkuNC9kaXN0L2xlYWZsZXQuY3Nz');
        document.head.appendChild(css);
        var js = document.createElement('script');
        js.src = atob('aHR0cHM6Ly91bnBrZy5jb20vbGVhZmxldEAxLjkuNC9kaXN0L2xlYWZsZXQuanM=');
        js.onload = function() { inicializarMapa(); };
        document.head.appendChild(js);
    })();

    // CONFIGURADO: Sua chave de API ativa do OpenWeather
    const API_KEY = '87a13cf2373f492ad3f28c6961c75223'; 
    let mapa = null;
    let marcador = null;

    function inicializarMapa(lat, lon) {
        if (typeof L === 'undefined') return;
        var latitude = lat || -27.5954;
        var longitude = lon || -48.5480;
        if (!mapa) {
            mapa = L.map('mapa').setView([latitude, longitude], 12);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '© OpenStreetMap'
            }).addTo(mapa);
            marcador = L.marker([latitude, longitude]).addTo(mapa);
        } else {
            mapa.setView([latitude, longitude], 12);
            marcador.setLatLng([latitude, longitude]);
        }
    }

    function atualizarPainel(dados) {
        if (!dados || !dados.wind || !dados.main) return;
        const cidade = dados.name || 'Desconhecido';
        const pais = dados.sys ? dados.sys.country : '';
        const ventoVelocidade = Math.round(dados.wind.speed * 3.6); 
        const ventoRajada = dados.wind.gust ? Math.round(dados.wind.gust * 3.6) : 0;
        const chuvaVolume = dados.rain && dados.rain['1h'] ? dados.rain['1h'] : 0;
        const temp = Math.round(dados.main.temp);

        document.getElementById('nomeLocal').innerText = 'Local: ' + cidade + ', ' + pais;
        document.getElementById('valorVento').innerText = ventoVelocidade + ' km/h';
        document.getElementById('valorRajada').innerText = ventoRajada + ' km/h';
        document.getElementById('valorChuva').innerText = chuvaVolume + ' mm';
        document.getElementById('valorTemp').innerText = temp + ' °C';

        const statusBox = document.getElementById('statusVoo');
        if (ventoVelocidade > 25 || ventoRajada > 35 || chuvaVolume > 0) {
            statusBox.innerText = '🔴 VOO PROIBIDO / PERIGOSO';
            statusBox.style.backgroundColor = '#dc3545';
            statusBox.style.color = '#fff';
        } else if (ventoVelocidade > 15 || ventoRajada > 22) {
            statusBox.innerText = '🟡 VOO COM CAUTELA / ATENÇÃO';
            statusBox.style.backgroundColor = '#ffc107';
            statusBox.style.color = '#000';
        } else {
            statusBox.innerText = '🟢 VOO LIBERADO';
            statusBox.style.backgroundColor = '#28a745';
            statusBox.style.color = '#fff';
        }
        if (dados.coord) inicializarMapa(dados.coord.lat, dados.coord.lon);
    }

    async function buscarPorCidade() {
        const cidade = document.getElementById('campoCidade').value.trim();
        if (!cidade) return alert('Por favor, digite o nome de uma cidade.');
        const statusBox = document.getElementById('statusVoo');
        statusBox.innerText = '⏳ BUSCANDO DADOS...';
        try {
            var apiBase = atob('aHR0cHM6Ly9hcGkub3BlbndlYXRoZXJtYXAub3JnL2RhdGEvMi41L3dlYXRoZXI/cT0=');
            const url = apiBase + encodeURIComponent(cidade) + '&appid=' + API_KEY + '&units=metric&lang=pt_br';
            const resposta = await fetch(url);
            if (!resposta.ok) throw new Error('Cidade não encontrada.');
            const dados = await resposta.json(); 
            atualizarPainel(dados);
        } catch (erro) {
            alert(erro.message);
            statusBox.innerText = '❌ ERRO NA CONSULTA';
            statusBox.style.backgroundColor = '#dc3545';
        }
    }

    function buscarPorGPS() {
        if (!navigator.geolocation) return alert('Sem suporte a GPS.');
        const statusBox = document.getElementById('statusVoo');
        statusBox.innerText = '⏳ OBTENDO GPS...';
        navigator.geolocation.getCurrentPosition(async (posicao) => {
            try {
                var apiGpsBase = atob('aHR0cHM6Ly9hcGkub3BlbndlYXRoZXJtYXAub3JnL2RhdGEvMi41L3dlYXRoZXI/bGF0PQ==');
                const url = apiGpsBase + posicao.coords.latitude + '&lon=' + posicao.coords.longitude + '&appid=' + API_KEY + '&units=metric&lang=pt_br';
                const resposta = await fetch(url);
                if (!resposta.ok) throw new Error('Falha na resposta do servidor.');
                const dados = await resposta.json(); 
                atualizarPainel(dados);
            } catch (erro) {
                alert(erro.message);
                statusBox.innerText = '❌ ERRO NA CONSULTA';
                statusBox.style.backgroundColor = '#dc3545';
            }
        }, () => {
            alert('GPS Recusado.');
            statusBox.innerText = '⚪ AGUARDANDO DADOS';
        });
    }

    window.onload = function() { inicializarMapa(); };
</script>
</body>
</html>
