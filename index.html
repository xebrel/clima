<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DroneWeather Pro</title>
    <link rel="stylesheet" href="https://unpkg.com" />
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #121214; color: #ffffff; margin: 0; padding: 15px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 400px; background-color: #1a1a1e; border-radius: 15px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); box-sizing: border-box; }
        h2 { text-align: center; margin-top: 0; color: #00adb5; }
        .local-info { text-align: center; font-size: 0.9rem; color: #aaaaaa; margin-bottom: 15px; }
        .status-box { background-color: #555555; color: white; text-align: center; padding: 15px; border-radius: 10px; font-weight: bold; font-size: 1.1rem; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.2); }
        .busca-container { display: flex; gap: 10px; margin-bottom: 20px; }
        input { flex: 1; padding: 10px; border-radius: 8px; border: 1px solid #333; background-color: #26262b; color: white; font-size: 1rem; width: 100%; box-sizing: border-box; }
        button { background-color: #00adb5; color: white; border: none; padding: 10px 15px; font-size: 0.9rem; font-weight: bold; border-radius: 8px; cursor: pointer; }
        .btn-gps { background-color: #28a745; width: 100%; margin-bottom: 20px; padding: 12px; color: white; border: none; font-weight: bold; border-radius: 8px; cursor: pointer; }
        .grid-clima { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .card { background-color: #26262b; padding: 15px; border-radius: 10px; text-align: center; border-left: 4px solid #00adb5; }
        .card-titulo { font-size: 0.85rem; color: #aaaaaa; text-transform: uppercase; margin-bottom: 5px; }
        .card-valor { font-size: 1.3rem; font-weight: bold; }
        #mapa { height: 200px; width: 100%; border-radius: 10px; border: 2px solid #26262b; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>DroneWeather Pro</h2>
        <div class="local-info" id="nomeLocal">Local: Aguardando consulta...</div>
        <div class="status-box" id="statusVoo">⚪ AGUARDANDO DADOS</div>
        <div class="busca-container">
            <input type="text" id="campoCidade" placeholder="Digite a cidade">
            <button onclick="buscarPorCidade()">Buscar</button>
        </div>
        <button class="btn-gps" onclick="tentarObterLocalizacao()">📍 Pegar Minha Localização</button>
        <div class="grid-clima">
            <div class="card"><div class="card-titulo">Vento Atual</div><div class="card-valor" id="txtVento">-- km/h</div></div>
            <div class="card"><div class="card-titulo">Chuva</div><div class="card-valor" id="txtChuva">-- mm</div></div>
            <div class="card"><div class="card-titulo">Satélites GPS</div><div class="card-valor">Simulado</div></div>
            <div class="card"><div class="card-titulo">Índice KP</div><div class="card-valor">Simulado</div></div>
        </div>
        <div id="mapa"></div>
    </div>
    <script src="https://unpkg.com"></script>
    <script>
        const LIMITE_VENTO = 20; let mapaInstancia = null; let marcadorAtual = null;
        function inicializarMapa(lat, lon) {
            if (mapaInstancia === null) {
                mapaInstancia = L.map('mapa').setView([lat, lon], 12);
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(mapaInstancia);
            } else { mapaInstancia.setView([lat, lon], 12); }
            if (marcadorAtual) { marcadorAtual.setLatLng([lat, lon]); } 
            else { marcadorAtual = L.marker([lat, lon]).addTo(mapaInstancia).bindPopup('📍 Ponto de Decolagem').openPopup(); }
        }
        setTimeout(() => { inicializarMapa(-23.5505, -46.6333); }, 500);
        async function consultarClimaReal(lat, lon, nomeCidade) {
            const status = document.getElementById("statusVoo");
            try {
                const resposta = await fetch(`https://open-meteo.com{lat}&longitude=${lon}&current=wind_speed_10m,precipitation`);
                const dados = await resposta.json();
                const vento = dados.current.wind_speed_10m; const chuva = dados.current.precipitation;
                document.getElementById("nomeLocal").innerText = "Local: " + nomeCidade;
                document.getElementById("txtVento").innerText = vento + " km/h";
                document.getElementById("txtChuva").innerText = chuva + " mm";
                inicializarMapa(lat, lon);
                if (chuva > 0) { status.innerText = "🔴 VOO PROIBIDO: CHUVA"; status.style.backgroundColor = "#d9534f"; }
                else if (vento > LIMITE_VENTO) { status.innerText = "🔴 VOO PROIBIDO: VENTO FORTE"; status.style.backgroundColor = "#d9534f"; }
                else { status.innerText = "🟢 CONDIÇÕES SEGURAS PARA VOO"; status.style.backgroundColor = "#04b445"; }
            } catch (erro) { alert("Erro de conexão."); }
        }
        async function buscarPorCidade() {
            const cityInput = document.getElementById("campoCidade").value; if (!cityInput) return;
            const cidadeFormatada = cityInput.normalize("NFD").replace(/[\u0300-\u036f]/g, "");
            try {
                const resposta = await fetch(`https://open-meteo.com{encodeURIComponent(cidadeFormatada)}&count=1&language=pt`);
                const dados = await resposta.json();
                if (dados.results && dados.results.length > 0) {
                    const local = dados.results[0];
                    consultarClimaReal(local.latitude, local.longitude, local.name);
                } else { alert("Cidade não encontrada."); }
            } catch (erro) { alert("Falha na busca."); }
        }
        function tentarObterLocalizacao() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (p) => { consultarClimaReal(p.coords.latitude, p.coords.longitude, "Sua Posição"); },
                    () => { buscarPorIP(); }
                );
            } else { buscarPorIP(); }
        }
        async function buscarPorIP() {
            try {
                const r = await fetch("https://ipapi.co"); const d = await r.json();
                if (d.city) { consultarClimaReal(d.latitude, d.longitude, d.city); }
            } catch (e) { alert("Erro de localização."); }
        }
    </script>
</body>
</html>
