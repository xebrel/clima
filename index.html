<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>DroneWeather Pro</title><link rel="stylesheet" href="https://unpkg.com"/><style>body{font-family:'Segoe UI',Arial,sans-serif;background-color:#121214;color:#fff;margin:0;padding:15px;display:flex;justify-content:center}.container{width:100%;max-width:400px;background-color:#1a1a1e;border-radius:15px;padding:20px;box-shadow:0 4px 15px rgba(0,0,0,.5);box-sizing:border-box}h2{text-align:center;margin-top:0;color:#00adb5}.local-info{text-align:center;font-size:.9rem;color:#aaa;margin-bottom:15px}.status-box{background-color:#555;color:#fff;text-align:center;padding:15px;border-radius:10px;font-weight:700;font-size:1.1rem;margin-bottom:20px;box-shadow:0 4px 6px rgba(0,0,0,.2)}.busca-container{display:flex;gap:10px;margin-bottom:20px}input{flex:1;padding:10px;border-radius:8px;border:1px solid #333;background-color:#26262b;color:#fff;font-size:1rem;width:100%;box-sizing:border-box}button{background-color:#00adb5;color:#fff;border:none;padding:10px 15px;font-size:.9rem;font-weight:700;border-radius:8px;cursor:pointer}.btn-gps{background-color:#28a745;width:100%;margin-bottom:20px;padding:12px;color:#fff;border:none;font-weight:700;border-radius:8px;cursor:pointer}.grid-clima{display:grid;grid-template-columns:1fr 1fr;gap:15px;margin-bottom:20px}.card{background-color:#26262b;padding:15px;border-radius:10px;text-align:center;border-left:4px solid #00adb5}.card-titulo{font-size:.85rem;color:#aaa;text-transform:uppercase;margin-bottom:5px}.card-valor{font-size:1.3rem;font-weight:700}#mapa{height:200px;width:100%;border-radius:10px;border:2px solid #26262b;margin-top:10px}</style></head><body><div class="container"><h2>DroneWeather Pro</h2><div class="local-info" id="nomeLocal">Local: Aguardando consulta...</div><div class="status-box" id="statusVoo">⚪ AGUARDANDO DADOS</div><div class="busca-container"><input type="text" id="campoCidade" placeholder="Digite a cidade"><button onclick="buscarPorCidade()">Buscar</button></div><button class="btn-gps" onclick="tentarObterLocalizacao()">📍 Pegar Minha Localização</button><div class="grid-clima"><div class="card"><div class="card-titulo">Vento Atual</div><div class="card-valor" id="txtVento">-- km/h</div></div><div class="card"><div class="card-titulo">Chuva</div><div class="card-valor" id="txtChuva">-- mm</div></div><div class="card"><div class="card-titulo">Satélites GPS</div><div class="card-valor">Simulado</div></div><div class="card"><div class="card-titulo">Índice KP</div><div class="card-valor">Simulado</div></div></div><div id="mapa"></div></div><script src="https://unpkg.com"></script><script>const LIMITE_VENTO=20;let mapaInstancia=null,marcadorAtual=null;function inicializarMapa(t,e){null===mapaInstancia?(mapaInstancia=L.map("mapa").setView([t,e],12),L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{attribution:"© OpenStreetMap"}).addTo(mapaInstancia)):mapaInstancia.setView([t,e],12),marcadorAtual?marcadorAtual.setLatLng([t,e]):marcadorAtual=L.marker([t,e]).addTo(mapaInstancia).bindPopup("📍 Ponto de Decolagem").openPopup()}setTimeout(()=>{inicializarMapa(-23.5505,-46.6333)},500);async function consultarClimaReal(t,e,a){const n=document.getElementById("statusVoo");try{const o=await fetch(https://open-meteo.com{t}&longitude=${e}&current=wind_speed_10m,precipitation),r=await o.json(),i=r.current.wind_speed_10m,s=r.current.precipitation;document.getElementById("nomeLocal").innerText="Local: "+a,document.getElementById("txtVento").innerText=i+" km/h",document.getElementById("txtChuva").innerText=s+" mm",inicializarMapa(t,e),s>0?(n.innerText="🔴 VOO PROIBIDO: CHUVA",n.style.backgroundColor="#d9534f"):i>LIMITE_VENTO?(n.innerText="🔴 VOO PROIBIDO: VENTO FORTE ("+i+" km/h)",n.style.backgroundColor="#d9534f"):(n.innerText="🟢 CONDIÇÕES SEGURAS PARA VOO",n.style.backgroundColor="#04b445")}catch(c){alert("Erro ao buscar dados climáticos."),n.innerText="🔴 ERRO DE CONEXÃO"}}async function buscarPorCidade(){const t=document.getElementById("campoCidade").value;if(!t)return alert("Digite o nome de uma cidade!");const e=document.getElementById("statusVoo");e.innerText="⏳ BUSCANDO...",e.style.backgroundColor="#555";const a=t.normalize("NFD").replace(/[\u0300-\u036f]/g,"");try{const n=await fetch(https://open-meteo.com{encodeURIComponent(a)}&count=1&language=pt),o=await n.json();if(o.results&&o.results.length > 0){const r=o.results[0];consultarClimaReal(r.latitude,r.longitude,r.name+", "+(r.admin1||r.country))}else alert("Cidade não encontrada."),e.innerText="🔴 NÃO ENCONTRADO"}catch(i){alert("Falha de comunicação."),e.innerText="🔴 FALHA NA BUSCA"}}function tentarObterLocalizacao(){document.getElementById("statusVoo").innerText="⏳ LOCALIZANDO...";navigator.geolocation?navigator.geolocation.getCurrentPosition(t=>{consultarClimaReal(t.coords.latitude,t.coords.longitude,"Sua Posição")},()=>{buscarPorIP()}):buscarPorIP()}async function buscarPorIP(){try{const t=await fetch("https://ipapi.co"),e=await t.json();e.city?consultarClimaReal(e.latitude,e.longitude,e.city+", "+e.region):document.getElementById("statusVoo").innerText="🔴 LOCAL FALHOU"}catch(a){document.getElementById("statusVoo").innerText="🔴 ERRO DE REDE"}}</script></body></html>
