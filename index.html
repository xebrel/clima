<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DroneWeather Pro</title>
    
    <!-- Correção da folha de estilos do mapa Leaflet via CDN -->
    <link rel="stylesheet" href="https://unpkg.com" />
    
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #121214;
            color: #fff;
            margin: 0;
            padding: 15px;
            display: flex;
            justify-content: center;
        }
        .container {
            width: 100%;
            max-width: 400px;
            background-color: #1a1a1e;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,.5);
            box-sizing: border-box;
        }
        h2 {
            text-align: center;
            margin-top: 0;
            color: #00adb5;
        }
        .local-info {
            text-align: center;
            font-size: .9rem;
            color: #aaa;
            margin-bottom: 15px;
        }
        .status-box {
            background-color: #555;
            color: #fff;
            text-align: center;
            padding: 15px;
            border-radius: 10px;
            font-weight: 700;
            font-size: 1.1rem;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,.2);
            transition: background 0.3s;
        }
        .busca-container {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }
        input {
            flex: 1;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #333;
            background-color: #26262b;
            color: #fff;
            font-size: 1rem;
            width: 100%;
            box-sizing: border-box;
        }
        button {
            background-color: #00adb5;
            color: #fff;
            border: none;
            padding: 10px 15px;
            font-size: .9rem;
            font-weight: 700;
            border-radius: 8px;
            cursor: pointer;
        }
        .btn-gps {
            background-color: #28a745;
            width: 100%;
            margin-bottom: 20px;
            padding: 12px;
            color: #fff;
            border: none;
            font-weight: 700;
            border-radius: 8px;
            cursor: pointer;
        }
        .grid-clima {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }
        .card {
            background-color: #26262b;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            border-left: 4px solid #00adb5;
        }
        .card-titulo {
            font-size: .85rem;
            color: #aaa;
            text-transform: uppercase;
            margin-bottom: 5px;
        }
        .card-valor {
            font-size: 1.3rem;
            font-weight: 700;
        }
        #mapa {
            height: 200px;
            width: 100%;
            border-radius: 10px;
            border: 2px solid #26262b;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>DroneWeather Pro</h2>
    <div class="local-info" id="nomeLocal">Local: Aguardando consulta...</div>
    <div class="status-box" id="statusVoo">⚪ AGUARDANDO DADOS</div>
    
    <div class="busca-container">
        <input type="text" id="campoCidade" placeholder="Digite a cidade...">
        <button onclick="buscarPorCidade()">Buscar</button>
    </div>
    <button class="btn-gps" onclick="buscarPorGPS()">Usar Localização Atual (GPS)</button>

    <div class="grid-clima">
        <div class="card">
            <div class="card-titulo">Vento</div>
            <div class="card-valor" id="valorVento">-- km/h</div>
        </div>
        <div class="card">
            <div class="card-titulo">Rajada</div>
            <div class="card-valor" id="valorRajada">-- km/h</div>
        </div>
        <div class="card">
            <div class="card-titulo">Chuva (1h)</div>
            <div class="card-valor" id="valorChuva">-- mm</div>
        </div>
        <div class="card">
            <div class="card-titulo">Temperatura</div>
            <div class="card-valor" id="valorTemp">-- °C</div>
        </div>
    </div>

    <div id="mapa"></div>
</div>

<!-- Importação do Script do Mapa Leaflet -->
<script src="https://unpkg.com"></script>

<script>
    // Configurações básicas da API de Clima (Chave pública demonstrativa da OpenWeather)
    const API_KEY = "b1b15e88fa797225412429c1c50c122a1"; 
    let mapa = null;
    let marcador = null;

    // Inicializa o mapa com coordenadas padrão (Brasília)
    function inicializarMapa(lat = -15.7801, lon = -47.9292) {
        if (!mapa) {
            mapa = L.map('mapa').setView([lat, lon], 12);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '© OpenStreetMap'
            }).addTo(mapa);
            marcador = L.marker([lat, lon]).addTo(mapa);
        } else {
            mapa.setView([lat, lon], 12);
            marcador.setLatLng([lat, lon]);
        }
    }

    // Processa os dados recebidos e decide as condições de voo do Drone
    function atualizarPainel(dados) {
        const cidade = dados.name;
        const pais = dados.sys.country;
        const ventoVelocidade = Math.round(dados.wind.speed * 3.6); // Converte m/s para km/h
        const ventoRajada = dados.wind.gust ? Math.round(dados.wind.gust * 3.6) : 0;
        const chuva Volume = dados.rain && dados.rain['1h'] ? dados.rain['1h'] : 0;
        const temp = Math.round(dados.main.temp);

        // Atualiza elementos visuais da interface
        document.getElementById('nomeLocal').innerText = `Local: ${cidade}, ${pais}`;
        document.getElementById('valorVento').innerText = `${ventoVelocidade} km/h`;
        document.getElementById('valorRajada').innerText = `${ventoRajada} km/h`;
        document.getElementById('valorChuva').innerText = `${chuvaVolume} mm`;
        document.getElementById('valorTemp').innerText = `${temp} °C`;

        // Lógica de Status de Voo do Drone
        const statusBox = document.getElementById('statusVoo');
        
        // Critérios restritivos: Vento > 25km/h, Rajadas > 35km/h ou qualquer sinal de chuva
        if (ventoVelocidade > 25 || ventoRajada > 35 || chuvaVolume > 0) {
            statusBox.innerText = "🔴 VOO PROIBIDO / PERIGOSO";
            statusBox.style.backgroundColor = "#dc3545";
        } else if (ventoVelocidade > 15 || ventoRajada > 22) {
            statusBox.innerText = "🟡 VOO COM CAUTELA / ATENÇÃO";
            statusBox.style.backgroundColor = "#ffc107";
            statusBox.style.color = "#000";
        } else {
            statusBox.innerText = "🟢 VOO LIBERADO";
            statusBox.style.backgroundColor = "#28a745";
            statusBox.style.color = "#fff";
        }

        // Atualiza posição do mapa
        inicializarMapa(dados.coord.lat, dados.coord.lon);
    }

    // Busca clima pelo nome digitado no campo de texto
    async function buscarPorCidade() {
        const cidade = document.getElementById('campoCidade').value.trim();
        if (!cidade) return alert("Por favor, digite o nome de uma cidade.");

        try {
            const url = `https://openweathermap.org{encodeURIComponent(cidade)}&appid=${API_KEY}&units=metric&lang=pt_br`;
            const resposta = await fetch(url);
            if (!resposta.ok) throw new Error("Cidade não encontrada.");
            const dados = await reply.json();
            atualizarPainel(dados);
        } catch (erro) {
            alert(erro.message);
        }
    }

    // Busca clima usando o sensor de GPS do navegador
    function buscarPorGPS() {
        if (!navigator.geolocation) return alert("Seu navegador não suporta Geolocalização.");

        navigator.geolocation.getCurrentPosition(async (posicao) => {
            const lat = posicao.coords.latitude;
            const lon = posicao.coords.longitude;
            try {
                const url = `https://openweathermap.org{lat}&lon=${lon}&appid=${API_KEY}&units=metric&lang=pt_br`;
                const resposta = await fetch(url);
                const dados = await reply.json();
                atualizarPainel(dados);
            } catch (erro) {
                alert("Erro ao buscar dados com o GPS.");
            }
        }, () => {
            alert("Acesso à localização negado pelo usuário.");
        });
    }

    // Inicializa o mapa vazio ao carregar a página
    window.onload = () => inicializarMapa();
</script>

</body>
</html>
